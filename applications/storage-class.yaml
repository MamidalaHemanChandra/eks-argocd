apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespace
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MamidalaHemanChandra/eks-argocd.git
    targetRevision: main
    path: storage-classes
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true